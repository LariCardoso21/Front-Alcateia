<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adicionar Clicli</title>
    <link rel="stylesheet" href="adicionarClicli.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">Alcateia</div>
        <ul class="nav-links">
            <li ><a href="dashboard.html">Dashboard</a></li>
            <li class="active"><a href="#">Clientes</a></li>
            <li><a href="Produtos.html">Produtos</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="funcionario.html">Funcionários</a></li>
            <li><a href="Financeiro.html">Relatórios</a></li>
            <li><a href="Vendas.html">Vendas</a></li>
        </ul>
    </aside>
<form class="form" id="form-cadastro-cliente"></form>

    <div class="container">
        
        <div class="card">
            <div class="header">
                <h2>Cadastro</h2>
                <p>Se cadastre no sistema</p>
            </div>

            <form class="form">
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome completo">
                </div>

                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" placeholder="seu-email@empresa.com">
                </div>

                <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000">
                </div>
                 <div class="form-group">

                    <label for="endereco">Endereço</label>
                    <input type="endereco" id="endereco" placeholder="rua. tal tal">
                </div>
                 <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="cidade" id="cidade" placeholder="Marilia-SP">
                </div>

                <form action="clientes.html">
                <button type="submit" class="btn-submit">Salvar</button>
                </form>
            </form>
        </div>

    </div>
    
<script src="clientes.js"></script>
</body>
</html>
