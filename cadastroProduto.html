<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Produto</title>
    <link rel="stylesheet" href="cadastroProduto.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo-area">Alcateia</div>
        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li class="active"><a href="#">Produtos</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="funcionario.html">Funcionários</a></li>
            <li><a href="Financeiro.html">Relatórios</a></li>
            <li><a href="Vendas.html">Vendas</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header-actions">
            <h1>Cadastro de Produtos</h1>
        </div>

        <div class="container">
            <form>
                <div class="grid">
                    
                    <div class="column">
                        <div class="form-group">
                            <label for="nome">Nome do Produto</label>
                            <input type="text" id="nome" placeholder="Ex: Mouse Gamer">
                        </div>

                        <div class="form-group">
                            <label for="qtd-estoque">Quantidade em Estoque</label>
                            <input type="number" id="qtd-estoque" placeholder="0">
                        </div>

                        <div class="form-group">
                            <label for="qtd-minima">Quantidade Mínima</label>
                            <input type="number" id="qtd-minima" placeholder="0">
                        </div>

                        <div class="form-group">
                            <label for="marca">Marca</label>
                            <input type="text" id="marca" placeholder="Digite a marca">
                        </div>

                        <div class="form-group">
                            <label for="valor">Valor</label>
                            <input type="text" id="valor" placeholder="R$ 0,00">
                        </div>
                    </div>

                    <div class="form-column">
                        <div class="form-group">
                            <label for="descricao">Descrição do Produto</label>
                            <textarea id="descricao" placeholder="Digite uma descrição do produto"></textarea>
                        </div>

                        <div class="button-group">
                            
                            <button type="submit" class="btn-submit" onclick="window.location.href='Produtos.html'">Salvar Produto</button>
                          
                            
                        </div>
                    </div>

                </div>
            </form>
        </div>
    </main>

    <script src="produto.js"></script>
</body>
</html>
