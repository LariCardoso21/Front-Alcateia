<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcateia - Produtos</title>
    <link rel="stylesheet" href="produtos.css">
</head>
<body style="overflow-x: hidden;">

    <aside class="sidebar">
        <div class="logo-area">Alcateia</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="clientes.html">Clientes</a></li>
            <li class="active"><a href="produtos.html">Produtos</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="funcionario.html">Funcionários</a></li>
            <li><a href="Financeiro.html">Relatórios</a></li>
            <li><a href="vendas.html">Vendas</a></li>

        </ul>
    </aside>

    <main class="main-content">
        <div class="header-actions">
            <div>
                <h1>Produtos Cadastrados</h1>
                <p class="subtitle">Gerencie o catálogo de produtos e seus preços</p>
            </div>
            <button class="btn-add-product" onclick="window.location.href=' cadastroProduto.html'">+ Cadastrar produto</button>
        </div>

        <div class="table-container">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>PRODUTO</th>
                        <th>QUANTIDADE</th>
                        <th style="text-align: center;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody>
                    
                </tbody>
            </table>
        </div>
    </main>

    <div id="drawer-produto" class="product-drawer">
        <div class="header">
            <h3>Detalhes do Produto</h3>
            <button class="btn-close-drawer" onclick="fecharDetalhesProd()">&times;</button>
        </div>
        
        <div class="drawer-body">
            <div class="info-group">
                <label>Nome do Produto</label>
                <input type="text" id="prod-nome">
            </div>

            <div class="info-group">
                <label>Marca / Fabricante</label>
                <input type="text" id="prod-marca">
            </div>

            <div class="info-group-row">
                <div class="info-group">
                    <label>Quantidade em Estoque</label>
                    <input type="text" id="prod-qtd">
                </div>
                <div class="info-group">
                    <label>Preço Unitário</label>
                    <input type="text" id="prod-preco">
                </div>
            </div>

            <div class="info-group">
                <label>Descrição Completa</label>
                <textarea id="prod-desc" rows="5"></textarea>
            </div>

            <div class="drawer-actions">
                <button type="button" class="btn-save-drawer" onclick="salvarProduto()">Salvar Alterações</button>
            </div>
        </div>
    </div>
    <form id="form-cadastro-produto"></form>

    <script src="produto.js"></script>
    

  
</body>
</html>
