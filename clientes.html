<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" href="clientes.css">
</head>
<body style="overflow-x: hidden;">

    <aside class="sidebar">
        <div class="logo-area">Alcateia</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li class="active"><a href="clientes.html">Clientes</a></li>
            <li><a href="produtos.html">Produtos</a></li>
            <li><a href="estoque.html">Estoque</a></li>
            <li><a href="funcionario.html">Funcionários</a></li>
            <li><a href="Financeiro.html">Relatórios</a></li>
            <li><a href="Vendas.html">Vendas</a></li>
        </ul>
    </aside>

    <main class="main-content">
        <div class="header-actions">
            <div>
                <h1>Clientes</h1>
                <p class="subtitle">Descrição e Cadastro de Clientes</p>
            </div>
            <button class="btn-add-client" onclick="window.location.href='adicionarClicli.html'">+ Adicionar Clientes</button>
        </div>

        <div class="container">
            <table class="table">
                <thead>
                    <tr>
                        <th>CLIENTE</th>
                        <th>EMAIL</th>
                        <th>TELEFONE</th>
                        <th style="text-align: center;">AÇÕES</th>
                    </tr>
                </thead>
                <tbody>
                   
                    <tbody id="tabela-clientes-body"></tbody>
                </tbody>
            </table>
        </div>
    </main>

    <div id="drawer-detalhes" class="client-drawer">
        <div class="drawer-header">
            <h3>Detalhes do Cliente</h3>
            <button class="btn-close-drawer" onclick="fecharDetalhes()">&times;</button>
        </div>
        
        <div class="drawer-body">
            <div class="info-group">
                <label>Nome Completo</label>
                <input type="text" id="detalhe-nome" value="">
            </div>

            <div class="info-group">
                <label>E-mail Corporativo</label>
                <input type="email" id="detalhe-email" value="">
            </div>

            <div class="info-group">
                <label>Telefone / WhatsApp</label>
                <input type="text" id="detalhe-telefone" value="">
            </div>

            <div class="info-group">
                <label>Endereço Residencial/Comercial</label>
                <input type="text" id="detalhe-endereco" value="">
            </div>

            <div class="info-group">
                <label>Cidade / Estado</label>
                <input type="text" id="detalhe-cidade" value="">
            </div>

            <div class="info-group">
                <label>Data de Cadastro no Sistema</label>
                <input type="text" id="detalhe-data" value="" readonly style="border-style: dashed; opacity: 0.7;">
            </div>

            <div class="drawer-actions">
                <button type="button" class="btn-save-drawer" onclick="salvarAlteracoes()">Salvar Alterações</button>
            </div>
        </div>
    </div>



    <script>
        function abrirDetalhes(nome, email, telefone, endereco, city, dataCadastro) {
            document.getElementById('detalhe-nome').value = nome;
            document.getElementById('detalhe-email').value = email;
            document.getElementById('detalhe-telefone').value = telefone;
            document.getElementById('detalhe-endereco').value = endereco;
            document.getElementById('detalhe-cidade').value = city;
            document.getElementById('detalhe-data').value = dataCadastro;

            document.getElementById('drawer-detalhes').classList.add('active');
        }

        function fecharDetalhes() {
            document.getElementById('drawer-detalhes').classList.remove('active');
        }

        function salvarAlteracoes() {
            alert("Alterações do cliente salvas com sucesso!");
            fecharDetalhes();
        }
    </script>
  

    <script src="Cliente.js"></script>
</body>
</html>
