
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alcateia - Funcionários</title>

    <link rel="stylesheet" href="funcionario.css">
</head>

<body style="overflow-x: hidden;">

    <aside class="sidebar">

        <div class="logo-area">
            Alcateia
        </div>

        <ul class="nav-links">

            <li>
                <a href="index.html">Dashboard</a>
            </li>

            <li>
                <a href="clientes.html">Clientes</a>
            </li>

            <li>
                <a href="produtos.html">Produtos</a>
            </li>

            <li>
                <a href="estoque.html">Estoque</a>
            </li>

            <li class="active">
                <a href="funcionario.html">Funcionários</a>
            </li>

            <li>
                <a href="Financeiro.html">Relatórios</a>
            </li>

            <li>
                <a href="vendas.html">Vendas</a>
            </li>

        </ul>

    </aside>


    <main class="main-content">

        <div class="header-actions">

            <div>

                <h1>Funcionários</h1>

                <p class="subtitle">
                    Descrição e Cadastro de Funcionários
                </p>

            </div>

            <button
                class="btn-add-employee"
                onclick="window.location.href='adicionarfun.html'"
            >
                + Adicionar Funcionário
            </button>

        </div>


        <div class="table-container">

            <table class="data-table">

                <thead>

                    <tr>

                        <th>FUNCIONÁRIO</th>

                        <th>SALÁRIO</th>

                        <th>TELEFONE</th>

                        <th style="text-align:center;">
                            AÇÕES
                        </th>

                    </tr>

                </thead>


                <tbody id="tabela-funcionarios-body">

                </tbody>

            </table>

        </div>

    </main>


    <!-- DRAWER -->

    <div
        id="drawer-funcionario"
        class="employee-drawer"
    >

        <div class="drawer-header">

            <h3>
                Detalhes do Funcionário
            </h3>

            <button
                class="btn-close-drawer"
                onclick="fecharDetalhesFunc()"
            >
                &times;
            </button>

        </div>


        <div class="drawer-body">

            <div class="info-group">

                <label>
                    Nome Completo
                </label>

                <input
                    type="text"
                    id="func-nome"
                >

            </div>


            <div class="info-group">

                <label>
                    CPF
                </label>

                <input
                    type="text"
                    id="func-cpf"
                >

            </div>


            <div class="info-group">

                <label>
                    Cargo / Função
                </label>

                <input
                    type="text"
                    id="func-cargo"
                >

            </div>


            <div class="info-group">

                <label>
                    Salário Base
                </label>

                <input
                    type="text"
                    id="func-salario"
                >

            </div>


            <div class="info-group">

                <label>
                    Telefone / Contato
                </label>

                <input
                    type="text"
                    id="func-telefone"
                >

            </div>


            <div class="info-group">

                <label>
                    Cidade / Estado
                </label>

                <input
                    type="text"
                    id="func-cidade"
                >

            </div>


            <div class="drawer-actions">

                <button
                    type="button"
                    class="btn-save-drawer"
                    onclick="salvarFuncionario()"
                >
                    Salvar Alterações
                </button>

            </div>

        </div>

    </div>


    <script src="funcionario.js"></script>

</body>
</html>
