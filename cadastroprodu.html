<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Produtos</title>

  <link rel="stylesheet" href="cadastroprod.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

  <div class="layout">

    <aside class="sidebar">

      <div class="logo">👤</div>

      <nav>
        <ul>

          <li>
            <a href="funcionario.html">Cliente</a>
          </li>

          <li class="active">
            <a href="listaprod.html">Produtos</a>
          </li>

          <li>
            <a href="controleesto.html">Controle de Estoque</a>
          </li>

          <li>
            <a href="funcionario.html">Funcionarios</a>
          </li>

          <li>
            <a href="folhapag.html">Relatórios</a>
          </li>

          <li>
            <a href="controleesto.html">Vendas</a>
          </li>

          <li>
            <a href="financeiro.html">Financeiro</a>
          </li>

          

        </ul>
      </nav>

    </aside>

    <main class="content">

      <header class="topbar">
        <h1>Cadastro de Produtos</h1>
      </header>

      <section class="card">

        <div class="form-grid">

          <div class="left">

            <div class="input-group">
              <label>Nome do Produto</label>

              <input type="text" placeholder="Ex: Mouse Gamer">
            </div>

            <div class="input-group">
              <label>Quantidade em Estoque</label>

              <input type="number" placeholder="0">
            </div>

            <div class="input-group">
              <label>Quantidade Mínima</label>

              <input type="number" placeholder="0">
            </div>

            <div class="input-group">
              <label>Marca</label>

              <input type="text" placeholder="Digite a marca">
            </div>

            <div class="input-group">
              <label>Valor</label>

              <input type="text" placeholder="R$ 0,00">
            </div>

          </div>

          <div class="right">

            <div class="input-group">
              <label>Descrição do Produto</label>

              <textarea placeholder="Digite uma descrição do produto"></textarea>
            </div>

            <div class="button-area">

              <form action="listaprod.html">

                <button type="submit">
                  Salvar Produto
                </button>

              </form>

            </div>

          </div>

        </div>

      </section>

    </main>

  </div>

</body>
</html>
