<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="layout">

   
    <aside class="sidebar">
      <div class="logo">👤</div>
      <nav>
        <ul>
          <li>Cliente</li>
          <li class="active">Produtos</li>
          <li>Controle de Estoque</li>
          <li>Funcionarios</li>
          <li>Relatórios</li>
          <li>Vendas</li>
          <li>Financeiro</li>
          <li>RH</li>
        </ul>
      </nav>
    </aside>

   
    <div class="main">

      
      <header class="header">
        <h1>Painel</h1>
      </header>

     
      <section class="content">

       
        <div class="top-bar">
          <input type="text" placeholder="Pesquisar..." />
          <button class="btn-primary">+ cadastrar novo produto</button>
        </div>

      
        <div class="card">
          <h2>Controle de estoque</h2>

          <table>
            <thead>
              <tr>
                <th class="tag id">id</th>
                <th class="tag produto">Produto</th>
                <th class="tag qtd">Quantidade</th>
                <th class="tag estoque">Estoque</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>2</td>
                <td>Lápis</td>
                <td>5</td>
                <td><span class="badge success">em estoque</span></td>
              </tr>
              <tr>
                <td>5</td>
                <td>Caderno</td>
                <td>7</td>
                <td><span class="badge danger">baixo estoque</span></td>
              </tr>
            </tbody>
          </table>

        </div>

      </section>
    </div>

  </div>

</body>
</html>
