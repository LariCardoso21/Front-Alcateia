    <div class="layout">

        <aside class="sidebar">

            <div class="logo">👤</div>

            <h2>Painel</h2>

            <div class="top-bar">

                <div class="search-box">

                    <input type="text" placeholder="Pesquisar...">

                    <span>🔍</span>

                </div>

            </div>

            <section class="card">

                <h3>Controle de Estoque</h3>

                <div class="table-header">

                    <span class="produto">Produto</span>

                    <span class="quantidade">Quantidade</span>

                </div>

                <div class="table">

                    <div class="row">

                        <span>2</span>

                        <span>Lápis</span>

                        <span>5</span>

                        </button>

                    </div>

                        <span>Caderno</span>

                        <span>7</span>

                        <button class="status red">
                            Baixo estoque
                        </button>

                    </div>

                    <div class="row">

                        <span>8</span>

                        <span>Borracha</span>

                        <span>12</span>

                        <button class="status green">
                            Em estoque
                        </button>

                    </div>

                    <div class="row">

                        <span>10</span>

                        <span>Caneta Azul</span>

                        <span>3</span>
                                

                        <form action="cadastroprodu.html">
                        <button class="status red">
                            Baixo estoque
                        </button>
                        </form>

                    </div>

                </div>

            </section>
