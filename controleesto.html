<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>

    <link rel="stylesheet" href="controleesto.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cabin:wght@400;500;600;700&family=Inter:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>

    <div class="layout">

        
        <aside class="sidebar">

            <div class="logo">👤</div>

            <nav>
                <ul>
                    <li>Cliente</li>
                    <li class="active">Produtos</li>
                    <li>Controle de Estoque</li>
                    <li>Relatorios</li>
                    <li>Vendas</li>
                    <li>Financeiro</li>
                </ul>
            </nav>

        </aside>

      
        <main class="content">

            <h2>Painel</h2>

            
            <div class="top-bar">

                <div class="search-box">
                    <input type="text" placeholder="Pesquisar...">
                    <span>🔍</span>
                </div>

                <button class="btn-add">
                    + cadastrar novo produto
                </button>

            </div>

           
            <section class="card">

                <h3>Controle de estoque</h3>

                
                <div class="table-header">

                    <span class="id">id</span>
                    <span class="produto">Produto</span>
                    <span class="quantidade">Quantidade</span>
                    <span class="estoque">Estoque</span>

                </div>

               
                <div class="table">

                    <div class="row">
                        <span>2</span>
                        <span>Lapis</span>
                        <span>5</span>

                        <button class="status green">
                            em estoque
                        </button>
                    </div>

                    <div class="row">
                        <span>5</span>
                        <span>Caderno</span>
                        <span>7</span>

                        <button class="status red">
                            baixo estoque
                        </button>
                    </div>

                </div>

            </section>

        </main>

    </div>

</body>
</html>
